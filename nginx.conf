upstream game_workers {
    ip_hash;  # Enables sticky sessions based on client IP (built-in to open-source NGINX)

    # List your workers (since all on same machine in cluster, use localhost:PORT multiple times)
    # NGINX will balance across the same port – the OS/cluster handles the workers.
    server 127.0.0.1:8080;
    # Add more lines if you want to weight them, e.g.:
    # server 127.0.0.1:8080 weight=1;
    keepalive 64;  # Optional: improves performance
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;  # Or 443 ssl; if you have HTTPS set up
    # server_name yourdomain.com;  # Optional: add your domain

    location / {
        proxy_pass http://game_workers;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for long-lived WebSocket connections
        proxy_read_timeout 86400s;  # 24 hours – adjust as needed
        proxy_send_timeout 86400s;
    }
}